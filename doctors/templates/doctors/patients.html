<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patients – Doctor Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">
    <div class="flex">
        <aside class="w-64 bg-white border-r border-gray-200 min-h-screen shrink-0">
            <nav class="p-4 space-y-1">
                <a href="/dashboard/"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 text-gray-700 text-sm">Dashboard</a>
                <a href="/schedule/"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 text-gray-700 text-sm">Schedule</a>
                <a href="/consultations/"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 text-gray-700 text-sm">Consultations</a>
                <a href="/patients/"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg bg-blue-50 text-blue-700 font-medium text-sm">Patients</a>
            </nav>
        </aside>

        <main class="flex-1 p-8 space-y-8">
            <div>
                <h1 class="text-3xl font-semibold mb-1">Patient Records</h1>
                <p class="text-sm text-gray-500">View and manage your patient medical records</p>
            </div>

            <!-- Search & Filter -->
            <div class="bg-white rounded-xl border border-gray-200 p-4">
                <div class="flex flex-col md:flex-row gap-3">
                    <div class="relative flex-1">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input id="search" oninput="renderTable()" placeholder="Search patients by name or condition..."
                            class="w-full pl-10 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <select id="status-filter" onchange="renderTable()"
                        class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="all">All Patients</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white rounded-xl border border-gray-200 p-6 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">Total Patients</p>
                        <p class="text-3xl font-semibold mt-1">6</p>
                    </div>
                    <div class="p-3 bg-blue-50 rounded-lg"><svg class="h-6 w-6 text-blue-600" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                        </svg></div>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 p-6 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">Active Patients</p>
                        <p class="text-3xl font-semibold mt-1">5</p>
                    </div>
                    <div class="p-3 bg-green-50 rounded-lg"><svg class="h-6 w-6 text-green-600" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
                            <polyline points="22 4 12 14.01 9 11.01" />
                        </svg></div>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 p-6 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">Total Visits</p>
                        <p class="text-3xl font-semibold mt-1">75</p>
                    </div>
                    <div class="p-3 bg-purple-50 rounded-lg"><svg class="h-6 w-6 text-purple-600" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" />
                            <line x1="16" y1="2" x2="16" y2="6" />
                            <line x1="8" y1="2" x2="8" y2="6" />
                            <line x1="3" y1="10" x2="21" y2="10" />
                        </svg></div>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="text-left px-6 py-3 font-medium text-gray-600">Patient</th>
                            <th class="text-left px-6 py-3 font-medium text-gray-600">Age / Gender</th>
                            <th class="text-left px-6 py-3 font-medium text-gray-600">Blood Type</th>
                            <th class="text-left px-6 py-3 font-medium text-gray-600">Primary Condition</th>
                            <th class="text-left px-6 py-3 font-medium text-gray-600">Last Visit</th>
                            <th class="text-left px-6 py-3 font-medium text-gray-600">Visits</th>
                            <th class="text-left px-6 py-3 font-medium text-gray-600">Status</th>
                            <th class="text-right px-6 py-3 font-medium text-gray-600">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="patient-tbody" class="divide-y divide-gray-100"></tbody>
                </table>
                <div id="no-results" class="hidden text-center py-12 text-gray-400">No patients found matching your
                    criteria.</div>
            </div>
        </main>
    </div>

    <script>
        const patients = [
            { id: 1, name: 'Saugat Panta', initials: 'SP', age: 28, gender: 'Male', bloodType: 'A+', lastVisit: '2026-06-16', condition: 'Hypertension', status: 'active', visits: 12 },
            { id: 2, name: 'Suvasis Giri', initials: 'SG', age: 35, gender: 'Male', bloodType: 'B+', lastVisit: '2026-06-16', condition: 'Seasonal Allergies', status: 'active', visits: 8 },
            { id: 3, name: 'Dipa Lama', initials: 'DL', age: 42, gender: 'Female', bloodType: 'O+', lastVisit: '2026-06-10', condition: 'Diabetes Type 2', status: 'active', visits: 24 },
            { id: 4, name: 'Dipak Singh', initials: 'DS', age: 31, gender: 'Male', bloodType: 'AB+', lastVisit: '2026-06-15', condition: 'Diabetes Type 2', status: 'active', visits: 15 },
            { id: 5, name: 'Ramesh Kumar', initials: 'RK', age: 45, gender: 'Male', bloodType: 'A-', lastVisit: '2026-05-28', condition: 'Asthma', status: 'inactive', visits: 6 },
            { id: 6, name: 'Sita Sharma', initials: 'SS', age: 38, gender: 'Female', bloodType: 'O-', lastVisit: '2026-06-14', condition: 'Migraine', status: 'active', visits: 10 },
        ];

        function renderTable() {
            const search = document.getElementById('search').value.toLowerCase();
            const filter = document.getElementById('status-filter').value;
            const filtered = patients.filter(p =>
                (filter === 'all' || p.status === filter) &&
                (p.name.toLowerCase().includes(search) || p.condition.toLowerCase().includes(search))
            );
            const tbody = document.getElementById('patient-tbody');
            const noRes = document.getElementById('no-results');
            if (!filtered.length) { tbody.innerHTML = ''; noRes.classList.remove('hidden'); return; }
            noRes.classList.add('hidden');
            tbody.innerHTML = filtered.map(p => `
      <tr class="hover:bg-gray-50">
        <td class="px-6 py-4">
          <div class="flex items-center gap-3">
            <div class="h-9 w-9 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-semibold text-xs">${p.initials}</div>
            <span class="font-medium">${p.name}</span>
          </div>
        </td>
        <td class="px-6 py-4 text-gray-600">${p.age} / ${p.gender}</td>
        <td class="px-6 py-4"><span class="border border-gray-300 text-gray-700 px-2 py-0.5 rounded text-xs">${p.bloodType}</span></td>
        <td class="px-6 py-4 text-gray-600">${p.condition}</td>
        <td class="px-6 py-4 text-gray-600">${new Date(p.lastVisit).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</td>
        <td class="px-6 py-4 text-gray-600">${p.visits}</td>
        <td class="px-6 py-4"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${p.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}">${p.status.charAt(0).toUpperCase() + p.status.slice(1)}</span></td>
        <td class="px-6 py-4 text-right"><a href="/patients/${p.id}/" class="border border-gray-300 px-3 py-1.5 rounded-lg text-xs hover:bg-gray-50">View Details</a></td>
      </tr>`).join('');
        }
        renderTable();
    </script>
</body>

</html>
