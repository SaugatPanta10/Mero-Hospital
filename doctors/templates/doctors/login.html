<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Portal – Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl">
        <div class="p-8 pb-4 text-center space-y-3">
            <div class="flex justify-center">
                <div class="p-3 bg-blue-600 rounded-full">
                    <svg class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Doctor Portal</h1>
            <p class="text-sm text-gray-500">Sign in to access your consultation dashboard</p>
        </div>
        <div class="p-8 pt-4">
            <div id="error-alert"
                class="hidden mb-4 flex items-center gap-2 border border-red-300 bg-red-50 text-red-700 rounded-lg px-4 py-3 text-sm">
                <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                Please enter both email and password.
            </div>
            <form class="space-y-5" onsubmit="handleLogin(event)">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input id="email" type="email" placeholder="doctor@hospital.com"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input id="password" type="password" placeholder="••••••••"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm transition-colors">
                    <a href="{% url 'dashboard' %}" class="text-blue-600 hover:underline">Sign In</a>

                </button>
            </form>
            <div class="mt-4 text-center text-sm">
                <a href="#" class="text-blue-600 hover:underline">Forgot password?</a>
            </div>
        </div>
    </div>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!email || !password) { document.getElementById('error-alert').classList.remove('hidden'); return; }
            window.location.href = '/dashboard/';
        }
    </script>
</body>

</html>
